# ConvNeXt-Tiny 2.5D — v3: 7-slice dilated (offsets -5,-3,-1,0,+1,+3,+5), 3 modalities = 21ch input
# Trained on 1 mm isotropic DWI+ADC+FLAIR data.
# Key improvements over v2: wider context, Tversky-OHEM-BCE loss, EMA.
# Results: val mean_dice ~0.69, test mean_dice ~0.58 (single model)
experiment_name: convnext_v3_7slice_dilated_1mm
seed: 42

data:
  csv_path: data/splits/isles2022_train_val_test.csv
  root: data/processed/isles2022_dwi_adc_flair_1mm
  k_slices: 2
  slice_offsets: [-5, -3, -1, 0, 1, 3, 5]  # dilated 7 slices × 3 mod = 21ch
  img_size: [256, 256]
  normalize: fixed_nonzero_zscore

train:
  batch_size: 4
  val_batch_size: 4
  num_workers: 0
  epochs: 150
  lr: 3.0e-4
  weight_decay: 1.0e-4
  amp: false

  backbone: convnext_tiny
  pretrained: true
  first_conv_init: repeat
  dec_ch: 256
  deep_sup: true

  scheduler: cosine
  warmup_epochs: 5
  min_lr: 1.0e-6

  sampler: pos_oversample
  pos_slice_weight: 50.0
  neg_slice_weight: 1.0

  augment: true
  p_flip: 0.5
  aug_rotation: 15.0
  aug_scale_range: [0.9, 1.1]
  aug_gamma_range: [0.7, 1.3]
  aug_noise_std: 0.02

  # Tversky loss with OHEM: α=0.3/β=0.7 emphasises recall for small lesions
  loss: tversky_ohem_bce
  tversky_alpha: 0.3
  tversky_beta: 0.7
  ohem_neg_fraction: 0.05
  ohem_min_neg: 2048

  # Exponential Moving Average for stable checkpointing
  ema: true
  ema_decay: 0.9998

  max_train_batches: 500

log:
  out_dir: results/convnext_v3_7slice_dilated_1mm
