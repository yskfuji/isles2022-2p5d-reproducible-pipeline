<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">ISLES 2.5D results snapshot</title>
  <desc id="desc">Benchmark table and bar chart comparing the 3D UNet baseline with a nearby-slice model, a wide-context model, and their ensemble.</desc>
  <rect width="1200" height="360" fill="#0f172a"/>
  <text x="60" y="48" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">ISLES 2022 — Results Snapshot</text>

  <!-- Table header -->
  <rect x="60" y="70" width="600" height="36" rx="4" fill="#1e3a5f"/>
  <text x="80"  y="93" fill="#93c5fd" font-family="Arial" font-size="13" font-weight="700">Model</text>
  <text x="380" y="93" fill="#93c5fd" font-family="Arial" font-size="13" font-weight="700" text-anchor="middle">val mean Dice</text>
  <text x="570" y="93" fill="#93c5fd" font-family="Arial" font-size="13" font-weight="700" text-anchor="middle">test mean Dice</text>

  <!-- Row 1 -->
  <rect x="60" y="106" width="600" height="34" fill="#1e293b"/>
  <text x="80"  y="128" fill="#cbd5e1" font-family="Arial" font-size="12">3D U-Net baseline</text>
  <text x="380" y="128" fill="#94a3b8" font-family="Arial" font-size="12" text-anchor="middle">0.652</text>
  <text x="570" y="128" fill="#94a3b8" font-family="Arial" font-size="12" text-anchor="middle">0.514</text>

  <!-- Row 2 -->
  <rect x="60" y="140" width="600" height="34" fill="#172032"/>
  <text x="80"  y="162" fill="#fbbf24" font-family="Arial" font-size="11">Nearby-slice model</text>
  <text x="380" y="162" fill="#fbbf24" font-family="Arial" font-size="12" text-anchor="middle">0.704</text>
  <text x="570" y="162" fill="#fbbf24" font-family="Arial" font-size="12" text-anchor="middle">~0.58</text>

  <!-- Row 3 -->
  <rect x="60" y="174" width="600" height="34" fill="#1e293b"/>
  <text x="80"  y="196" fill="#34d399" font-family="Arial" font-size="11">Wide-context model</text>
  <text x="380" y="196" fill="#34d399" font-family="Arial" font-size="12" text-anchor="middle">0.690</text>
  <text x="570" y="196" fill="#34d399" font-family="Arial" font-size="12" text-anchor="middle">0.579</text>

  <!-- Row 4 (best) -->
  <rect x="60" y="208" width="600" height="36" rx="0" fill="#1e3a1e" stroke="#10b981" stroke-width="1.5"/>
  <text x="80"  y="231" fill="#6ee7b7" font-family="Arial" font-size="11" font-weight="700">Two-model ensemble</text>
  <text x="380" y="231" fill="#6ee7b7" font-family="Arial" font-size="13" font-weight="700" text-anchor="middle">0.722</text>
  <text x="570" y="231" fill="#6ee7b7" font-family="Arial" font-size="13" font-weight="700" text-anchor="middle">0.631</text>
  <text x="690" y="231" fill="#6ee7b7" font-family="Arial" font-size="10">← best</text>

  <!-- improvement note -->
  <text x="60" y="270" fill="#64748b" font-family="Arial" font-size="12">vs. 3D U-Net baseline:</text>
  <text x="215" y="270" fill="#10b981" font-family="Arial" font-size="13" font-weight="700">test +0.117  (+22.8% relative)</text>

  <!-- Bar chart -->
  <text x="800" y="90" fill="#94a3b8" font-family="Arial" font-size="12" font-weight="700">test mean Dice</text>
  <!-- baseline -->
  <rect x="800" y="108" width="205" height="28" rx="3" fill="#475569"/>
  <text x="812" y="127" fill="#f8fafc" font-family="Arial" font-size="11">0.514  3D U-Net</text>
  <!-- 5-slice -->
  <rect x="800" y="144" width="232" height="28" rx="3" fill="#b45309"/>
  <text x="812" y="163" fill="#f8fafc" font-family="Arial" font-size="11">~0.58  nearby</text>
  <!-- 7-slice -->
  <rect x="800" y="180" width="232" height="28" rx="3" fill="#047857"/>
  <text x="812" y="199" fill="#f8fafc" font-family="Arial" font-size="11">0.579  wide</text>
  <!-- ensemble -->
  <rect x="800" y="216" width="252" height="32" rx="3" fill="#059669"/>
  <text x="812" y="237" fill="#f8fafc" font-family="Arial" font-size="12" font-weight="700">0.631  ensemble ★</text>

  <!-- scale labels -->
  <text x="800" y="270" fill="#475569" font-family="Arial" font-size="10">0.0</text>
  <text x="895" y="270" fill="#475569" font-family="Arial" font-size="10">0.25</text>
  <text x="990" y="270" fill="#475569" font-family="Arial" font-size="10">0.50</text>
  <text x="1082" y="270" fill="#475569" font-family="Arial" font-size="10">0.75</text>
</svg>
